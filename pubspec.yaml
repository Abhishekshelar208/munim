name: munim
description: "MUNI-M — The Intelligence Behind Your Money"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  lottie: ^3.1.2
  firebase_core: ^4.7.0

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.2

  # Networking
  http: ^1.2.1

  # Utils
  intl: ^0.20.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
